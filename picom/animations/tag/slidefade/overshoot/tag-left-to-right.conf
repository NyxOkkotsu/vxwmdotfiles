{
match = "window_type = 'normal'"
  animations = (
    {
      triggers = ["show"];
      opacity = {
        curve = "cubic-bezier(0.22,1,0.36,1)";
        duration = 0.9;
        start = 0;
        end = 1;
      };
      blur-opacity = "opacity";
      shadow-opacity = "opacity";
      offset-x = {
          curve = "cubic-bezier(0.22, 1.5, 0.36, 1)";
          duration = 0.9;
          start = -200;
          end = 0;
      };

      shadow-offset-x = "offset-x";
    },
    {
      triggers = ["hide"];
        opacity = {
          curve = "cubic-bezier(0.22,1,0.36,1)";
          duration = 0.9;
          start = 1;
          end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";
        offset-x = {
          curve = "cubic-bezier(0.22, 1.5, 0.36, 1)";
          duration = 0.9;
          start = 0;
          end = -200;
        };

        shadow-offset-x = "offset-x";
    }
  )
}
