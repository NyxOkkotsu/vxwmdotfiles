# --- Font Configuration ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5

# --- Window Transparency ---
background_opacity 0.65

# --- Cursor Customization ---
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

include ~/.cache/wal/colors-kitty.conf
